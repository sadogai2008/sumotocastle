<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ローカルAI イベント案内文作成</title>

<style>
body{
    font-family:sans-serif;
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

textarea{
    width:100%;
    min-height:180px;
    padding:12px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    padding:12px 20px;
    margin-top:15px;
    font-size:16px;
    cursor:pointer;
}

#status{
    margin-top:20px;
    font-weight:bold;
}

#result{
    margin-top:20px;
    border:1px solid #ccc;
    border-radius:8px;
    padding:15px;
    white-space:pre-wrap;
    min-height:120px;
}
</style>
</head>

<body>

<h1>🤖 ローカルAI イベント案内文メーカー</h1>

<p>
イベント情報を入力すると、ブラウザ内のAIが案内文を生成します。<br>
APIキー不要・完全無料です。
</p>

<textarea id="input">
イベント名：夏まつり2026
日時：2026年8月10日 18:00～
場所：洲本市民広場
対象：どなたでも参加可能
参加費：無料
内容：屋台、ステージイベント、花火大会
</textarea>

<br>

<button id="generate">
案内文を生成する
</button>

<div id="status">
待機中
</div>

<div id="result">
ここに生成結果が表示されます。
</div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const button = document.getElementById("generate");

let engine = null;

async function loadModel() {
    statusEl.textContent =
        "AIモデルをダウンロード中…（初回のみ数分かかる場合があります）";

    engine = new webllm.MLCEngine();

    await engine.reload("Llama-3.2-1B-Instruct-q4f16_1");

    statusEl.textContent = "AI準備完了";
}

button.addEventListener("click", async () => {
    try {
        button.disabled = true;

        if (!engine) {
            await loadModel();
        }

        statusEl.textContent = "文章生成中...";

        const info = document.getElementById("input").value;

        const prompt = `
以下のイベント情報をもとに、
親しみやすく分かりやすいイベント案内文を200文字程度で作成してください。

${info}

案内文：
`;

        const response = await engine.chat.completions.create({
            messages: [
                {
                    role: "user",
                    content: prompt
                }
            ],
            temperature: 0.7,
            max_tokens: 300
        });

        resultEl.textContent =
            response.choices[0].message.content;

        statusEl.textContent = "生成完了";

    } catch (error) {
        console.error(error);

        statusEl.textContent = "エラー";

        resultEl.textContent =
            "エラーが発生しました。\n\n" + error.message;
    } finally {
        button.disabled = false;
    }
});
</script>

</body>
</html>
